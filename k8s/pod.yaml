apiVersion: v1
kind: Pod
metadata:
  name: nginx-test
spec:
  containers:
  - name: nginx
    image: nginx
    command: ["/bin/sh", "-c"]
    args:
      - sed -i 's/listen 80;/listen 8080;/g' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
    ports:
    - containerPort: 8080
    volumeMounts:
    - name: cache-volume
      mountPath: /var/cache/nginx
  volumes:
  - name: cache-volume
    emptyDir: {}
